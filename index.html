<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>讀書後重點整理</title>
  <link rel="preload" href="theme.js" as="script">
  <link rel="preload" href="bg.js" as="script">
  <link rel="preload" href="data.json" as="fetch" type="application/json" crossorigin="anonymous">
  <style>
    * { box-sizing: border-box; }
    :root {
      --app-bg: #f6f2ea;
      --app-ink: #1d2528;
      --app-muted: #657075;
      --app-paper: rgba(255, 255, 255, .94);
      --app-card: #ffffff;
      --app-soft: #f3efe6;
      --app-line: rgba(48, 64, 70, .16);
      --app-accent: #9b5b25;
      --app-accent-2: #1f7a78;
      --app-accent-3: #c84c44;
      --app-shadow: 0 20px 48px rgba(35, 31, 25, .12);
      --app-radius: 8px;
      --control-bg: rgba(255, 255, 255, .94);
    }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--app-ink);
      background: var(--app-bg);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      line-height: 1.6;
      letter-spacing: 0;
    }
    button,
    input,
    select,
    textarea {
      font: inherit;
    }
    a { color: inherit; }
    #scroll-progress-bar {
      position: fixed;
      top: env(safe-area-inset-top, 0);
      left: 0;
      z-index: 9999;
      width: 0%;
      height: 4px;
      background: linear-gradient(90deg, #00f5ff, #0bbcd6, #00ff88);
      box-shadow: 0 0 10px rgba(0, 255, 200, .8);
      transition: width .1s linear;
      pointer-events: none;
    }
    .dynamic-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .top-controls {
      position: sticky;
      top: 8px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      width: min(1180px, calc(100% - 20px));
      margin: 8px auto 0;
      padding: 6px;
      border: 1px solid var(--app-line);
      border-radius: var(--app-radius);
      background: var(--control-bg);
      box-shadow: 0 12px 30px rgba(0, 0, 0, .10);
      backdrop-filter: blur(16px);
    }
    .control-group {
      display: inline-grid;
      grid-template-columns: auto max-content;
      align-items: center;
      gap: 6px;
      width: fit-content;
      min-width: 0;
      padding: 3px 5px;
      border: 1px solid rgba(0, 0, 0, .08);
      border-radius: 6px;
      background: rgba(255, 255, 255, .66);
    }
    .fit-control select {
      width: auto;
      min-width: 0;
      max-width: 28ch;
      field-sizing: content;
    }
    .book-control {
      grid-template-columns: auto minmax(220px, 1fr) auto auto auto;
      flex: 1 1 440px;
      min-width: min(100%, 430px);
    }
    .search-control {
      grid-template-columns: auto minmax(150px, 220px) auto;
      min-width: 0;
    }
    .control-group label {
      color: var(--app-muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .control-group select,
    .control-group input {
      min-height: 28px;
      width: 100%;
      border: 1px solid var(--app-line);
      border-radius: 5px;
      background: #fff;
      color: var(--app-ink);
      padding: 2px 8px;
    }
    .control-button,
    .tool-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      border: 1px solid var(--app-line);
      border-radius: 5px;
      background: var(--app-soft);
      color: var(--app-ink);
      padding: 2px 10px;
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .page-button {
      width: 28px;
      padding: 0;
      font-size: 18px;
      line-height: 1;
    }
    .control-button:disabled {
      cursor: not-allowed;
      opacity: .45;
    }
    .page-info {
      min-width: 5.5ch;
      color: var(--app-muted);
      font-size: 12px;
      font-weight: 900;
      text-align: center;
      white-space: nowrap;
    }
    .control-text-measure {
      position: fixed;
      top: -9999px;
      left: -9999px;
      visibility: hidden;
      white-space: nowrap;
      pointer-events: none;
    }
    .book-shell {
      position: relative;
      z-index: 1;
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
      padding: 14px 0 52px;
    }
    .book-view,
    .empty-state {
      border: 1px solid var(--app-line);
      border-radius: var(--app-radius);
      background: var(--app-paper);
      box-shadow: var(--app-shadow);
    }
    .book-view {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 0;
      overflow: visible;
    }
    .book-side {
      min-height: 100%;
      color: #fff;
      border-radius: var(--app-radius) 0 0 var(--app-radius);
      background:
        linear-gradient(160deg, color-mix(in srgb, var(--app-accent), #111 14%), var(--app-accent-2));
    }
    .book-side-inner {
      position: sticky;
      top: 50vh;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 16px;
      max-height: calc(100vh - 96px);
      padding: 24px;
      text-align: center;
      transform: translateY(-50%);
    }
    .book-mark {
      width: 58px;
      height: 86px;
      border: 2px solid rgba(255,255,255,.52);
      border-radius: 4px 4px 24px 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.30), rgba(255,255,255,.06)),
        rgba(255,255,255,.12);
    }
    .book-side h2 {
      margin: 0;
      font-size: clamp(1.55rem, 4vw, 2.6rem);
      line-height: 1.12;
      letter-spacing: 0;
    }
    .book-side p {
      margin: 0;
      color: rgba(255,255,255,.80);
    }
    .book-meta {
      display: grid;
      gap: 8px;
      width: 100%;
      margin-top: 8px;
      text-align: left;
    }
    .meta-row {
      display: grid;
      grid-template-columns: 68px 1fr;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,.22);
      font-size: 14px;
    }
    .meta-row span {
      color: rgba(255,255,255,.68);
      font-weight: 800;
    }
    .book-main {
      display: grid;
      gap: 18px;
      align-content: start;
      padding: 24px;
      border-radius: 0 var(--app-radius) var(--app-radius) 0;
      background: var(--app-card);
    }
    .highlight-panel {
      border: 1px solid var(--app-line);
      border-radius: var(--app-radius);
      background: var(--app-paper);
      padding: 18px;
    }
    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 12px;
      color: var(--app-accent);
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0;
    }
    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--app-line);
    }
    .point-grid {
      display: grid;
      grid-template-columns: 1fr !important;
      gap: 10px;
      margin-top: 12px;
    }
    .point-card {
      display: grid;
      grid-template-columns: max-content minmax(0, 1fr);
      align-items: start;
      gap: 0.5em;
      border: 1px solid var(--app-line);
      border-radius: 7px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.52)),
        var(--app-soft);
      padding: 9px 12px;
      color: var(--app-ink);
      word-break: break-word;
    }
    .point-number {
      color: var(--app-accent);
      font-weight: 900;
      white-space: nowrap;
    }
    .point-text {
      min-width: 0;
    }
    .point-card-plain .point-text {
      grid-column: 1 / -1;
    }
    .pending {
      border: 1px dashed color-mix(in srgb, var(--app-accent), transparent 35%);
      border-radius: 7px;
      background: var(--app-soft);
      padding: 16px;
      color: var(--app-muted);
    }
    .empty-state {
      padding: 26px;
      color: var(--app-muted);
      text-align: center;
    }
    .loading {
      min-height: 240px;
      display: grid;
      place-items: center;
    }
    @media (max-width: 920px) {
      .book-view {
        grid-template-columns: 1fr;
      }
      .book-side {
        min-height: 260px;
        border-radius: var(--app-radius) var(--app-radius) 0 0;
      }
      .book-side-inner {
        position: static;
        max-height: none;
        min-height: 260px;
        transform: none;
      }
      .book-main {
        border-radius: 0 0 var(--app-radius) var(--app-radius);
      }
    }
    @media (max-width: 760px) {
      .top-controls {
        position: relative;
        top: auto;
        width: min(100% - 14px, 560px);
      }
      .control-group,
      .book-control,
      .search-control {
        width: 100%;
        min-width: 0;
      }
      .control-group {
        grid-template-columns: auto minmax(0, 1fr);
      }
      .book-control {
        grid-template-columns: auto minmax(0, 1fr) auto auto auto;
      }
      .search-control {
        grid-template-columns: auto minmax(0, 1fr) auto;
      }
      .book-shell {
        width: min(100% - 14px, 560px);
        padding-top: 10px;
      }
      .book-side-inner,
      .book-main {
        padding: 18px;
      }
    }
    @media (max-width: 520px) {
      .book-control {
        grid-template-columns: minmax(0, 1fr) auto auto auto;
      }
      .book-control label,
      .search-control label {
        grid-column: 1 / -1;
      }
      .search-control {
        grid-template-columns: minmax(0, 1fr) auto;
      }
    }
    @media print {
      .top-controls,
      .dynamic-bg,
      #scroll-progress-bar {
        display: none;
      }
      .book-shell {
        width: 100%;
        padding: 0;
      }
      .book-view {
        box-shadow: none;
      }
    }
  </style>
  <style id="themeStyle"></style>
</head>
<body>
  <div id="scroll-progress-bar" aria-hidden="true"></div>
  <div id="dynamicBackground" class="dynamic-bg" aria-hidden="true"></div>

  <div class="top-controls">
    <div class="control-group fit-control">
      <label for="themeSelect">風格</label>
      <select id="themeSelect" aria-label="風格"></select>
    </div>
    <div class="control-group fit-control">
      <label for="bgSelect">背景</label>
      <select id="bgSelect" aria-label="背景"></select>
    </div>
    <div class="control-group fit-control">
      <label for="categorySelect">主題</label>
      <select id="categorySelect" aria-label="主題"></select>
    </div>
    <div class="control-group search-control">
      <label for="searchInput">搜尋</label>
      <input id="searchInput" type="search" placeholder="書名或作者關鍵字" autocomplete="off">
      <button id="searchButton" class="control-button" type="button">搜尋</button>
    </div>
    <div class="control-group book-control">
      <label for="bookSelect">書名</label>
      <select id="bookSelect" aria-label="書名"></select>
      <button id="prevPageButton" class="control-button page-button" type="button" aria-label="上一頁">‹</button>
      <span id="pageInfo" class="page-info">1/1 頁</span>
      <button id="nextPageButton" class="control-button page-button" type="button" aria-label="下一頁">›</button>
    </div>
  </div>

  <main class="book-shell">
    <section id="bookView" class="empty-state loading" aria-live="polite">載入中</section>
  </main>

  <script>
    (function () {
      "use strict";

      const manifestUrl = "data.json";
      const pageSize = 50;
      const state = {
        manifest: null,
        category: null,
        book: null,
        cache: new Map(),
        mode: "category",
        searchQuery: "",
        bookOptions: [],
        bookPage: 1
      };

      const els = {
        themeSelect: document.getElementById("themeSelect"),
        bgSelect: document.getElementById("bgSelect"),
        categorySelect: document.getElementById("categorySelect"),
        bookSelect: document.getElementById("bookSelect"),
        prevPageButton: document.getElementById("prevPageButton"),
        nextPageButton: document.getElementById("nextPageButton"),
        pageInfo: document.getElementById("pageInfo"),
        searchInput: document.getElementById("searchInput"),
        searchButton: document.getElementById("searchButton"),
        bookView: document.getElementById("bookView"),
        statusText: document.getElementById("statusText"),
        categoryStatus: document.getElementById("categoryStatus"),
        bookCount: document.getElementById("bookCount"),
        progressBar: document.getElementById("scroll-progress-bar")
      };

      document.addEventListener("DOMContentLoaded", init);
      document.addEventListener("scroll", updateScrollProgress, { passive: true });
      window.addEventListener("resize", updateScrollProgress);

      async function init() {
        try {
          const manifest = await loadJson(manifestUrl);
          state.manifest = manifest;
          populateCategories(manifest.categories || []);
          const params = new URLSearchParams(window.location.search);
          const requestedCategory = params.get("category");
          const firstCategory = findCategory(requestedCategory) || manifest.categories[0];
          if (!firstCategory) throw new Error("data.json 沒有主題分類。");
          els.categorySelect.value = firstCategory.id;
          await selectCategory(firstCategory.id, params.get("book"));
          bindEvents();
          fitCompactControls();
        } catch (error) {
          renderError(error);
        } finally {
          updateScrollProgress();
        }
      }

      function bindEvents() {
        [els.themeSelect, els.bgSelect, els.categorySelect].forEach(function (select) {
          if (select) select.addEventListener("change", fitCompactControls);
        });

        els.categorySelect.addEventListener("change", function () {
          state.mode = "category";
          state.searchQuery = "";
          els.searchInput.value = "";
          selectCategory(els.categorySelect.value).catch(renderError);
        });

        els.bookSelect.addEventListener("change", function () {
          selectBookOption(els.bookSelect.value).catch(renderError);
        });

        els.prevPageButton.addEventListener("click", function () {
          if (state.bookPage <= 1) return;
          state.bookPage -= 1;
          renderBookOptionsPage();
        });

        els.nextPageButton.addEventListener("click", function () {
          const totalPages = getTotalPages();
          if (state.bookPage >= totalPages) return;
          state.bookPage += 1;
          renderBookOptionsPage();
        });

        els.searchButton.addEventListener("click", function () {
          searchBooks().catch(renderError);
        });

        els.searchInput.addEventListener("keydown", function (event) {
          if (event.key === "Enter") {
            event.preventDefault();
            searchBooks().catch(renderError);
          }
        });
      }

      async function selectCategory(categoryId, requestedBookId) {
        const category = findCategory(categoryId);
        if (!category) return;

        state.category = category;
        els.categorySelect.value = category.id;

        if (state.mode === "category") {
          state.bookOptions = categoryBooks(category.id).map(function (book) {
            return optionFromBook(book, category.id);
          });
          state.bookPage = 1;
          const firstBook = categoryBooks(category.id).find(function (book) {
            return book.id === requestedBookId;
          }) || categoryBooks(category.id)[0];
          renderBookOptionsPage();
          if (firstBook) {
            jumpToOption(category.id, firstBook.id);
            await selectBook(firstBook.id);
          } else {
            state.book = null;
            renderEmpty("這個主題目前還沒有書籍資料。");
          }
        }

        updateStats();
      }

      async function selectBookOption(value) {
        const option = parseOptionValue(value);
        if (!option.bookId) return;
        const category = findCategory(option.categoryId || (state.category && state.category.id));
        if (!category) return;

        if (!state.category || state.category.id !== category.id) {
          state.category = category;
          els.categorySelect.value = category.id;
        }

        await selectBook(option.bookId);
      }

      async function selectBook(bookId) {
        const indexBook = findBookIndex(bookId);
        if (!indexBook || !indexBook.file) return;
        const book = await loadBook(indexBook);
        state.book = book;
        renderBook(book);
        setSelectedBookOption(indexBook.categoryId, book.id);
      }

      async function searchBooks() {
        const query = normalize(els.searchInput.value);
        if (!query) {
          state.mode = "category";
          state.searchQuery = "";
          await selectCategory(els.categorySelect.value);
          return;
        }

        const results = asArray(state.manifest.books).filter(function (book) {
          return normalize(book.title).includes(query) || normalize(book.author).includes(query);
        });

        state.mode = "search";
        state.searchQuery = els.searchInput.value.trim();
        state.bookOptions = results.map(function (book) {
          return optionFromBook(book, book.categoryId);
        });
        state.bookPage = 1;
        renderBookOptionsPage();

        if (!results.length) {
          renderEmpty(`找不到「${state.searchQuery}」。`);
          updateStats();
          return;
        }

        const first = results[0];
        await selectBookOption(makeOptionValue(first.categoryId, first.id));
        setStatus(`搜尋「${state.searchQuery}」找到 ${results.length} 筆，已顯示第一筆。`);
        updateStats();
      }

      async function loadBook(indexBook) {
        const url = versionedUrl(indexBook.file);
        if (state.cache.has(url)) return state.cache.get(url);
        const data = await loadJson(url);
        state.cache.set(url, data);
        return data;
      }

      async function loadJson(url) {
        const response = await fetch(url, { cache: "default" });
        if (!response.ok) throw new Error(`${url} 載入失敗：${response.status}`);
        return response.json();
      }

      function versionedUrl(url) {
        const version = state.manifest && state.manifest.generatedAt;
        if (!version) return url;
        const result = new URL(url, window.location.href);
        result.searchParams.set("v", version);
        return result.href;
      }

      function populateCategories(categories) {
        els.categorySelect.innerHTML = categories.map(function (category) {
          return `<option value="${escapeAttr(category.id)}">${escapeHtml(category.label)}</option>`;
        }).join("");
        fitCompactControls();
      }

      function renderBookOptionsPage() {
        const total = state.bookOptions.length;
        const totalPages = getTotalPages();
        state.bookPage = Math.min(totalPages, Math.max(1, state.bookPage));
        const start = (state.bookPage - 1) * pageSize;
        const pageItems = state.bookOptions.slice(start, start + pageSize);

        els.bookSelect.innerHTML = pageItems.map(function (book) {
          const label = state.mode === "search" ? `${categoryLabel(book.categoryId)}｜${book.title}` : book.title;
          return `<option value="${escapeAttr(makeOptionValue(book.categoryId, book.id))}">${escapeHtml(label)}</option>`;
        }).join("");

        els.bookSelect.disabled = !pageItems.length;
        els.prevPageButton.disabled = state.bookPage <= 1 || totalPages <= 1;
        els.nextPageButton.disabled = state.bookPage >= totalPages || totalPages <= 1;
        els.pageInfo.textContent = `${state.bookPage}/${totalPages} 頁`;
      }

      function jumpToOption(categoryId, bookId) {
        const index = state.bookOptions.findIndex(function (book) {
          return book.id === bookId && book.categoryId === categoryId;
        });
        if (index >= 0) {
          state.bookPage = Math.floor(index / pageSize) + 1;
          renderBookOptionsPage();
        }
        setSelectedBookOption(categoryId, bookId);
      }

      function setSelectedBookOption(categoryId, bookId) {
        const value = makeOptionValue(categoryId, bookId);
        const hasOption = Array.from(els.bookSelect.options).some(function (option) {
          return option.value === value;
        });
        if (hasOption) els.bookSelect.value = value;
      }

      function renderBook(book) {
        const points = asArray(book.chatgptHighlights);
        const metaRows = [
          ["作者", book.author]
        ].filter(function (row) { return row[1]; });

        document.title = `${book.title} - 讀書後重點整理`;
        if (state.mode !== "search") {
          setStatus(`${book.title}｜${book.author}`);
        }
        els.bookView.className = "book-view";
        els.bookView.innerHTML = `
          <aside class="book-side">
            <div class="book-side-inner">
              <div class="book-mark" aria-hidden="true"></div>
              <div>
                <h2>${escapeHtml(book.title)}</h2>
                <p>${escapeHtml(book.author)}</p>
              </div>
              <div class="book-meta">
                ${metaRows.map(function (row) {
                  return `<div class="meta-row"><span>${escapeHtml(row[0])}</span><div>${sourceLink(row[0], row[1], book.sourceUrl)}</div></div>`;
                }).join("")}
              </div>
            </div>
          </aside>
          <div class="book-main">
            <section class="highlight-panel">
              <h3 class="section-title">ChatGPT 重點整理</h3>
              ${points.length ? `<div class="point-grid">${points.map(function (point) {
                return renderPoint(point);
              }).join("")}</div>` : `<div class="pending">此書尚未產出重點整理。</div>`}
            </section>
          </div>
        `;

        updateStats();
      }

      function renderPoint(point) {
        const text = String(point == null ? "" : point);
        const match = text.match(/^(\s*\d{1,3}[、.．。)）]\s*)([\s\S]*)$/);
        if (!match) {
          return `<article class="point-card point-card-plain"><span class="point-text">${escapeHtml(text)}</span></article>`;
        }
        return `<article class="point-card"><span class="point-number">${escapeHtml(match[1].trim())}</span><span class="point-text">${escapeHtml(match[2])}</span></article>`;
      }

      function sourceLink(label, value, href) {
        if (label !== "來源" || !href) return escapeHtml(value);
        return `<a href="${escapeAttr(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(value)}</a>`;
      }

      function renderEmpty(message) {
        setStatus(message);
        els.bookView.className = "empty-state";
        els.bookView.textContent = message;
      }

      function renderError(error) {
        const message = error && error.message ? error.message : String(error);
        setStatus("資料載入失敗。");
        if (els.categoryStatus) els.categoryStatus.textContent = "請用本機伺服器或 GitHub Pages 開啟";
        els.bookView.className = "empty-state";
        els.bookView.textContent = message;
      }

      function updateStats() {
        const manifestCount = (state.manifest && state.manifest.totalBooks) || 0;
        const currentCount = state.category ? categoryBooks(state.category.id).length : 0;
        if (els.bookCount) els.bookCount.textContent = manifestCount || currentCount;
        if (state.mode === "search") {
          if (els.categoryStatus) els.categoryStatus.textContent = `搜尋結果：${state.bookOptions.length} 筆`;
        } else {
          if (els.categoryStatus) els.categoryStatus.textContent = state.category ? `${state.category.label}：${currentCount} 本` : "尚未選擇主題";
        }
      }

      function setStatus(message) {
        if (els.statusText) els.statusText.textContent = message;
      }

      function fitCompactControls() {
        [els.themeSelect, els.bgSelect, els.categorySelect].forEach(fitSelectToSelection);
      }

      function fitSelectToSelection(select) {
        if (!select || !select.options || !select.options.length) return;
        const option = select.options[select.selectedIndex] || select.options[0];
        const measurer = getSelectMeasurer(select);
        measurer.textContent = option ? option.textContent : "";
        const textWidth = Math.ceil(measurer.getBoundingClientRect().width);
        const style = window.getComputedStyle(select);
        const padding = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
        const border = parseFloat(style.borderLeftWidth) + parseFloat(style.borderRightWidth);
        const width = Math.min(320, Math.max(84, textWidth + padding + border + 34));
        select.style.width = `${width}px`;
      }

      function getSelectMeasurer(select) {
        let measurer = document.getElementById("controlTextMeasure");
        if (!measurer) {
          measurer = document.createElement("span");
          measurer.id = "controlTextMeasure";
          measurer.className = "control-text-measure";
          document.body.appendChild(measurer);
        }
        const style = window.getComputedStyle(select);
        measurer.style.font = style.font;
        measurer.style.letterSpacing = style.letterSpacing;
        return measurer;
      }

      function updateScrollProgress() {
        if (!els.progressBar) return;
        const scrollTop = window.scrollY || document.documentElement.scrollTop;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const progress = docHeight > 0 ? scrollTop / docHeight * 100 : 0;
        els.progressBar.style.width = `${Math.min(100, Math.max(0, progress))}%`;
      }

      function findCategory(id) {
        return (state.manifest && asArray(state.manifest.categories).find(function (category) {
          return category.id === id;
        })) || null;
      }

      function findBookIndex(id) {
        return (state.manifest && asArray(state.manifest.books).find(function (book) {
          return book.id === id;
        })) || null;
      }

      function categoryBooks(categoryId) {
        return state.manifest ? asArray(state.manifest.books).filter(function (book) {
          return book.categoryId === categoryId;
        }) : [];
      }

      function categoryLabel(categoryId) {
        const category = findCategory(categoryId);
        return category ? category.label : categoryId;
      }

      function optionFromBook(book, categoryId) {
        return {
          id: book.id,
          title: book.title,
          author: book.author,
          categoryId: categoryId || book.categoryId
        };
      }

      function makeOptionValue(categoryId, bookId) {
        return `${categoryId || ""}::${bookId || ""}`;
      }

      function parseOptionValue(value) {
        const parts = String(value || "").split("::");
        return { categoryId: parts[0] || "", bookId: parts[1] || "" };
      }

      function getTotalPages() {
        return Math.max(1, Math.ceil(state.bookOptions.length / pageSize));
      }

      function normalize(value) {
        return String(value || "").trim().toLocaleLowerCase();
      }

      function asArray(value) {
        return Array.isArray(value) ? value : [];
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, function (char) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "\"": "&quot;",
            "'": "&#39;"
          }[char];
        });
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/\n/g, " ");
      }
    })();
  </script>
  <script src="bg.js" defer></script>
  <script src="theme.js" defer></script>
</body>
</html>
