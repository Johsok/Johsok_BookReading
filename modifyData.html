<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>修改書籍資料</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f4efe6;
      --ink: #20272b;
      --muted: #667176;
      --paper: rgba(255, 255, 255, .94);
      --soft: #eee6d9;
      --line: rgba(54, 64, 68, .16);
      --accent: #9b5b25;
      --accent-2: #1f7a78;
      --danger: #b6423a;
      --shadow: 0 18px 44px rgba(36, 31, 24, .12);
    }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(80, 70, 55, .07) 1px, transparent 1px) 0 0 / 34px 34px,
        linear-gradient(0deg, rgba(80, 70, 55, .06) 1px, transparent 1px) 0 0 / 34px 34px,
        var(--bg);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      line-height: 1.6;
      letter-spacing: 0;
    }
    button,
    input,
    select,
    textarea {
      font: inherit;
    }
    a { color: inherit; }
    .app {
      width: min(1220px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 34px;
    }
    .toolbar,
    .editor-shell,
    .status-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }
    .toolbar {
      position: sticky;
      top: 8px;
      z-index: 5;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 8px;
      backdrop-filter: blur(16px);
    }
    .field {
      display: inline-grid;
      grid-template-columns: auto minmax(180px, 1fr);
      align-items: center;
      gap: 6px;
      min-width: min(100%, 290px);
      padding: 4px 6px;
      border: 1px solid rgba(0, 0, 0, .08);
      border-radius: 6px;
      background: rgba(255, 255, 255, .68);
    }
    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .field select,
    .field input {
      min-height: 30px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #fff;
      color: var(--ink);
      padding: 3px 8px;
    }
    .button,
    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: var(--soft);
      color: var(--ink);
      padding: 4px 12px;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .button.primary {
      border-color: color-mix(in srgb, var(--accent), #000 8%);
      background: var(--accent);
      color: #fff;
    }
    .button.danger {
      border-color: color-mix(in srgb, var(--danger), #000 8%);
      background: var(--danger);
      color: #fff;
    }
    .button:disabled {
      cursor: not-allowed;
      opacity: .45;
    }
    .header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 16px;
      align-items: stretch;
      margin: 18px 0;
    }
    .hero,
    .counter {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
      padding: clamp(20px, 4vw, 34px);
    }
    .hero {
      display: grid;
      align-content: end;
      min-height: 190px;
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.8rem);
      line-height: 1;
      letter-spacing: 0;
    }
    .counter {
      display: grid;
      align-content: space-between;
    }
    .counter strong {
      color: var(--accent);
      font-size: clamp(3rem, 8vw, 5rem);
      line-height: .9;
    }
    .counter span {
      color: var(--muted);
      font-weight: 900;
    }
    .editor-shell {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      overflow: hidden;
    }
    .book-list {
      min-height: 600px;
      max-height: 78vh;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.58), rgba(255,255,255,.18)), var(--soft);
      padding: 12px;
    }
    .book-list h2,
    .json-panel h2,
    .status-panel h2 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 1rem;
    }
    .book-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: stretch;
      margin: 0 0 8px;
    }
    .book-button {
      display: block;
      width: 100%;
      min-height: 42px;
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, .76);
      color: var(--ink);
      padding: 8px 10px;
      text-align: left;
      cursor: pointer;
    }
    .book-button[aria-pressed="true"] {
      border-color: var(--accent);
      box-shadow: inset 4px 0 0 var(--accent);
    }
    .book-button small {
      display: block;
      color: var(--muted);
      word-break: break-word;
    }
    .book-delete {
      min-width: 42px;
      border: 1px solid color-mix(in srgb, var(--danger), #000 8%);
      border-radius: 6px;
      background: var(--danger);
      color: #fff;
      padding: 4px 8px;
      font-weight: 900;
      cursor: pointer;
    }
    .book-delete:hover {
      filter: brightness(.94);
    }
    .json-panel {
      display: grid;
      grid-template-rows: auto minmax(560px, 1fr);
      gap: 10px;
      padding: 14px;
    }
    .editor-head {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }
    .editor-meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }
    textarea {
      width: 100%;
      min-height: 560px;
      height: 72vh;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111821;
      color: #eef7ff;
      padding: 14px;
      font-family: Consolas, "Cascadia Mono", "Microsoft JhengHei", monospace;
      font-size: 14px;
      line-height: 1.55;
      tab-size: 2;
      white-space: pre;
    }
    .status-panel {
      margin-top: 14px;
      padding: 14px;
    }
    .status-line {
      margin: 0;
      color: var(--muted);
      word-break: break-word;
    }
    .status-line.ok { color: var(--accent-2); }
    .status-line.bad { color: var(--danger); }
    @media (max-width: 880px) {
      .header,
      .editor-shell {
        grid-template-columns: 1fr;
      }
      .book-list {
        min-height: auto;
        max-height: 280px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }
    @media (max-width: 640px) {
      .toolbar {
        position: relative;
        top: auto;
      }
      .field {
        grid-template-columns: 1fr;
        width: 100%;
      }
      .button,
      .nav-link {
        flex: 1 1 130px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <nav class="toolbar">
      <a class="nav-link" href="index.html">回首頁</a>
      <div class="field">
        <label for="fileSelect">檔案</label>
        <select id="fileSelect"></select>
      </div>
      <div class="field">
        <label for="bookSortSelect">書籍排序</label>
        <select id="bookSortSelect">
          <option value="title:asc">書名（升冪）</option>
          <option value="title:desc">書名（降冪）</option>
          <option value="author:asc">作者（升冪）</option>
          <option value="author:desc">作者（降冪）</option>
          <option value="id:asc">ID（升冪）</option>
          <option value="id:desc">ID（降冪）</option>
        </select>
      </div>
      <button id="sortBooksButton" class="button" type="button">套用排序</button>
      <button id="loadButton" class="button" type="button">讀取</button>
      <button id="openLocalButton" class="button" type="button">選擇本機檔</button>
      <button id="formatButton" class="button" type="button">格式化</button>
      <button id="validateButton" class="button" type="button">驗證</button>
      <button id="saveButton" class="button primary" type="button">儲存</button>
      <button id="downloadButton" class="button" type="button">下載</button>
      <button id="deleteBookButton" class="button danger" type="button">刪除本書</button>
    </nav>

    <section class="header" aria-labelledby="pageTitle">
      <div class="hero">
        <p class="eyebrow">Johsok Book Reading</p>
        <h1 id="pageTitle">修改書籍資料</h1>
      </div>
      <aside class="counter">
        <strong id="bookCount">0</strong>
        <span>本書</span>
      </aside>
    </section>

    <section class="editor-shell">
      <aside class="book-list">
        <h2>書籍（目前順序）</h2>
        <div id="bookList"></div>
      </aside>
      <section class="json-panel">
        <div class="editor-head">
          <h2 id="editorTitle">JSON</h2>
          <span id="editorMeta" class="editor-meta">尚未載入</span>
        </div>
        <textarea id="jsonEditor" spellcheck="false"></textarea>
      </section>
    </section>

    <section class="status-panel" aria-live="polite">
      <h2>狀態</h2>
      <p id="statusText" class="status-line">請選擇檔案後讀取。</p>
    </section>
  </main>

  <script>
    (function () {
      "use strict";

      const manifestUrl = "data.json";
      const state = {
        manifest: null,
        currentFile: "data.json",
        currentHandle: null,
        currentData: null,
        selectedBookId: ""
      };

      const els = {
        fileSelect: document.getElementById("fileSelect"),
        bookSortSelect: document.getElementById("bookSortSelect"),
        sortBooksButton: document.getElementById("sortBooksButton"),
        loadButton: document.getElementById("loadButton"),
        openLocalButton: document.getElementById("openLocalButton"),
        formatButton: document.getElementById("formatButton"),
        validateButton: document.getElementById("validateButton"),
        saveButton: document.getElementById("saveButton"),
        downloadButton: document.getElementById("downloadButton"),
        deleteBookButton: document.getElementById("deleteBookButton"),
        bookCount: document.getElementById("bookCount"),
        bookList: document.getElementById("bookList"),
        editorTitle: document.getElementById("editorTitle"),
        editorMeta: document.getElementById("editorMeta"),
        jsonEditor: document.getElementById("jsonEditor"),
        statusText: document.getElementById("statusText")
      };

      document.addEventListener("DOMContentLoaded", init);

      async function init() {
        bindEvents();
        try {
          state.manifest = await loadJson(manifestUrl);
          populateFileSelect();
          await loadSelectedFile();
        } catch (error) {
          setStatus(error.message || String(error), "bad");
        }
      }

      function bindEvents() {
        els.fileSelect.addEventListener("change", function () {
          state.currentFile = els.fileSelect.value;
          state.currentHandle = null;
          loadSelectedFile().catch(showError);
        });
        els.loadButton.addEventListener("click", function () {
          state.currentHandle = null;
          loadSelectedFile().catch(showError);
        });
        els.openLocalButton.addEventListener("click", openLocalFile);
        els.sortBooksButton.addEventListener("click", sortBooks);
        els.formatButton.addEventListener("click", formatEditor);
        els.validateButton.addEventListener("click", validateEditor);
        els.saveButton.addEventListener("click", saveEditor);
        els.downloadButton.addEventListener("click", downloadEditor);
        els.deleteBookButton.addEventListener("click", function () {
          deleteBook().catch(showError);
        });
        els.jsonEditor.addEventListener("input", function () {
          els.editorMeta.textContent = "已修改";
        });
      }

      function populateFileSelect() {
        const options = [{ label: "data.json", file: "data.json" }].concat(
          (state.manifest.books || []).map(function (book) {
            return {
              label: `${categoryLabel(book.categoryId)}｜${book.title}`,
              file: book.file
            };
          })
        );
        els.fileSelect.innerHTML = options.map(function (item) {
          return `<option value="${escapeAttr(item.file)}">${escapeHtml(item.label)}</option>`;
        }).join("");
        els.fileSelect.value = state.currentFile;
      }

      async function loadSelectedFile() {
        state.currentFile = els.fileSelect.value || "data.json";
        const data = await loadJson(versionedUrl(state.currentFile));
        setEditorData(data, state.currentFile, "已從網站檔案載入");
      }

      async function loadJson(url) {
        const response = await fetch(url, { cache: "default" });
        if (!response.ok) throw new Error(`${url} 載入失敗：${response.status}`);
        return response.json();
      }

      function versionedUrl(url) {
        const version = state.manifest && state.manifest.generatedAt;
        if (!version || url === manifestUrl) return url;
        const result = new URL(url, window.location.href);
        result.searchParams.set("v", version);
        return result.href;
      }

      async function openLocalFile() {
        if (!window.showOpenFilePicker) {
          setStatus("此瀏覽器不支援本機覆蓋儲存，請使用下載。", "bad");
          return;
        }
        const handles = await window.showOpenFilePicker({
          multiple: false,
          types: [{ description: "JSON", accept: { "application/json": [".json"] } }]
        });
        const handle = handles[0];
        const file = await handle.getFile();
        const text = await file.text();
        const data = JSON.parse(text);
        state.currentHandle = handle;
        state.currentFile = file.name;
        setEditorData(data, file.name, "已從本機檔案載入");
      }

      function setEditorData(data, fileName, message) {
        state.currentData = data;
        state.selectedBookId = "";
        els.jsonEditor.value = JSON.stringify(data, null, 2);
        els.editorTitle.textContent = fileName;
        els.editorMeta.textContent = "已載入";
        renderBookList(data);
        setStatus(message, "ok");
      }

      function renderBookList(data) {
        const books = Array.isArray(data.books) ? data.books : (data.id ? [data] : []);
        els.bookCount.textContent = books.length;
        if (!books.length) {
          els.bookList.innerHTML = `<p class="status-line">此檔案沒有 books 陣列。</p>`;
          return;
        }
        els.bookList.innerHTML = books.map(function (book, index) {
          return `
            <div class="book-row">
              <button class="book-button" type="button" data-book-id="${escapeAttr(book.id)}" data-book-file="${escapeAttr(book.file || "")}" aria-pressed="${book.id === state.selectedBookId}">
                ${index + 1}. ${escapeHtml(book.title || book.id)}
                <small>${escapeHtml(book.author || "")}</small>
              </button>
              <button class="book-delete" type="button" data-book-id="${escapeAttr(book.id)}" title="從索引刪除" aria-label="刪除 ${escapeAttr(book.title || book.id)}">刪</button>
            </div>
          `;
        }).join("");
        els.bookList.querySelectorAll(".book-button").forEach(function (button) {
          button.addEventListener("click", function () {
            state.selectedBookId = button.dataset.bookId || "";
            if (button.dataset.bookFile) {
              state.currentFile = button.dataset.bookFile;
              state.currentHandle = null;
              els.fileSelect.value = state.currentFile;
              loadSelectedFile().catch(showError);
              return;
            }
            renderBookList(parseEditorJson());
            focusBookInEditor(state.selectedBookId);
          });
        });
        els.bookList.querySelectorAll(".book-delete").forEach(function (button) {
          button.addEventListener("click", function (event) {
            event.stopPropagation();
            deleteBook(button.dataset.bookId || "").catch(showError);
          });
        });
      }

      /**
       * 從 data.json 索引移除指定書籍；瀏覽器無法刪除站內 JSON 檔，需手動處理。
       * @param {string} [bookId] 要刪除的書籍 id；省略時依目前選取或單書內容判斷。
       */
      async function deleteBook(bookId) {
        const editorData = parseEditorJson();
        const targetId = bookId || state.selectedBookId || (editorData && editorData.id) || "";
        if (!targetId) {
          setStatus("請先選取要刪除的書籍。", "bad");
          return;
        }

        let indexData;
        let editingIndex = Array.isArray(editorData.books) && Array.isArray(editorData.categories);
        if (editingIndex) {
          indexData = editorData;
        } else {
          indexData = await loadJson(manifestUrl);
        }

        const book = (indexData.books || []).find(function (item) {
          return item && item.id === targetId;
        });
        if (!book) {
          setStatus(`索引中找不到 id「${targetId}」。`, "bad");
          return;
        }

        const filePath = book.file || "";
        const confirmed = window.confirm(
          `確定從索引刪除《${book.title || book.id}》？\n\n` +
          `會從 data.json 移除這本書。\n` +
          (filePath ? `儲存後請手動刪除檔案：\n${filePath}` : "若有對應單書 JSON，請一併手動刪除。")
        );
        if (!confirmed) {
          setStatus("已取消刪除。", "");
          return;
        }

        indexData.books = (indexData.books || []).filter(function (item) {
          return !(item && item.id === targetId);
        });
        if (typeof indexData.totalBooks === "number") {
          indexData.totalBooks = indexData.books.length;
        }

        state.manifest = indexData;
        state.selectedBookId = "";
        state.currentFile = "data.json";
        state.currentHandle = null;
        populateFileSelect();
        els.fileSelect.value = "data.json";
        setEditorData(indexData, "data.json", `已從索引移除《${book.title || book.id}》；請按「儲存」寫入 data.json` + (filePath ? `，並手動刪除 ${filePath}` : "") + "。");
        els.editorMeta.textContent = "已修改";
      }

      function focusBookInEditor(bookId) {
        if (!bookId) return;
        const marker = `"id": "${bookId.replace(/\\/g, "\\\\").replace(/"/g, "\\\"")}"`;
        const index = els.jsonEditor.value.indexOf(marker);
        if (index >= 0) {
          els.jsonEditor.focus();
          els.jsonEditor.setSelectionRange(index, index + marker.length);
          els.jsonEditor.scrollTop = Math.max(0, index / els.jsonEditor.value.length * els.jsonEditor.scrollHeight - 160);
        }
      }

      function formatEditor() {
        const data = parseEditorJson();
        els.jsonEditor.value = JSON.stringify(data, null, 2);
        state.currentData = data;
        renderBookList(data);
        setStatus("格式化完成。", "ok");
      }

      function sortBooks() {
        const data = parseEditorJson();
        if (!Array.isArray(data.categories) || !Array.isArray(data.books)) {
          setStatus("只有 data.json 索引可以排序。", "bad");
          return;
        }

        const [key, direction] = els.bookSortSelect.value.split(":");
        const collator = new Intl.Collator("zh-Hant", { numeric: true, sensitivity: "base" });
        data.books.sort(function (left, right) {
          const leftValue = left && left[key] != null ? left[key] : "";
          const rightValue = right && right[key] != null ? right[key] : "";
          const result = collator.compare(String(leftValue), String(rightValue));
          return direction === "desc" ? -result : result;
        });

        els.jsonEditor.value = JSON.stringify(data, null, 2);
        state.currentData = data;
        renderBookList(data);
        els.editorMeta.textContent = "已修改";
        const selectedLabel = els.bookSortSelect.options[els.bookSortSelect.selectedIndex].textContent;
        setStatus(`已依${selectedLabel}重排 ${data.books.length} 本書；請按「儲存」或「下載」保留結果。`, "ok");
      }

      function validateEditor() {
        const data = parseEditorJson();
        const result = validateData(data);
        state.currentData = data;
        renderBookList(data);
        setStatus(result.message, result.ok ? "ok" : "bad");
      }

      async function saveEditor() {
        const data = parseEditorJson();
        const result = validateData(data);
        if (!result.ok) {
          setStatus(result.message, "bad");
          return;
        }

        const content = JSON.stringify(data, null, 2) + "\n";
        if (state.currentHandle) {
          const writable = await state.currentHandle.createWritable();
          await writable.write(content);
          await writable.close();
          setStatus(`${state.currentFile} 已儲存。`, "ok");
          els.editorMeta.textContent = "已儲存";
          return;
        }

        if (window.showSaveFilePicker) {
          const handle = await window.showSaveFilePicker({
            suggestedName: fileNameOnly(state.currentFile),
            types: [{ description: "JSON", accept: { "application/json": [".json"] } }]
          });
          const writable = await handle.createWritable();
          await writable.write(content);
          await writable.close();
          state.currentHandle = handle;
          setStatus(`${state.currentFile} 已儲存。`, "ok");
          els.editorMeta.textContent = "已儲存";
          return;
        }

        downloadText(content, fileNameOnly(state.currentFile));
        setStatus("已下載 JSON。", "ok");
      }

      function downloadEditor() {
        const data = parseEditorJson();
        downloadText(JSON.stringify(data, null, 2) + "\n", fileNameOnly(state.currentFile));
        setStatus("已下載 JSON。", "ok");
      }

      function downloadText(content, fileName) {
        const blob = new Blob([content], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName || "data.json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function parseEditorJson() {
        return JSON.parse(els.jsonEditor.value);
      }

      function validateData(data) {
        if (!data || typeof data !== "object") return { ok: false, message: "JSON 根節點必須是物件。" };
        if (state.currentFile === "data.json" || Array.isArray(data.categories)) {
          if (!Array.isArray(data.categories)) return { ok: false, message: "data.json 缺少 categories 陣列。" };
          if (!Array.isArray(data.books)) return { ok: false, message: "data.json 缺少 books 陣列。" };
          for (const book of data.books) {
            if (!book.id || !book.title || !book.author || !book.categoryId || !book.file) {
              return { ok: false, message: "每筆索引都需要 id、title、author、categoryId、file。" };
            }
          }
          return { ok: true, message: `驗證完成：${data.categories.length} 個主題，${data.books.length} 本索引。` };
        }
        if (!data.id || !data.title || !data.author || !data.categoryId) {
          return { ok: false, message: "單書 JSON 需要 id、title、author、categoryId。" };
        }
        if (!Array.isArray(data.chatgptHighlights)) {
          return { ok: false, message: `${data.title} 缺少 chatgptHighlights 陣列。` };
        }
        const chatgptInvalid = findInvalidHighlightPrefix(data.chatgptHighlights);
        if (chatgptInvalid) {
          return { ok: false, message: `${data.title} 的 chatgptHighlights ${chatgptInvalid}` };
        }
        return { ok: true, message: `驗證完成：${data.title}。` };
      }

      function categoryLabel(categoryId) {
        const category = (state.manifest.categories || []).find(function (item) {
          return item.id === categoryId;
        });
        return category ? category.label : categoryId;
      }

      function fileNameOnly(path) {
        return String(path || "data.json").split(/[\\/]/).pop() || "data.json";
      }

      function findInvalidHighlightPrefix(highlights) {
        const shortLabelPattern = /^\d{2,3}、[^：]{1,12}：/;
        for (let index = 0; index < highlights.length; index += 1) {
          const text = String(highlights[index] ?? "");
          if (text.includes("｜")) {
            return `第 ${index + 1} 點含有「｜」綴字。`;
          }
          if (shortLabelPattern.test(text)) {
            return `第 ${index + 1} 點使用短標籤加冒號。`;
          }
        }
        return "";
      }

      function showError(error) {
        setStatus(error.message || String(error), "bad");
      }

      function setStatus(message, type) {
        els.statusText.textContent = message;
        els.statusText.className = `status-line ${type || ""}`.trim();
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, function (char) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "\"": "&quot;",
            "'": "&#39;"
          }[char];
        });
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/\n/g, " ");
      }
    })();
  </script>
</body>
</html>
